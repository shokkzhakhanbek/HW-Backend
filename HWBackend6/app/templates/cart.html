{% extends "base.html" %}
{% block title %}Cart{% endblock %}
{% block content %}
<h1>Cart</h1>

{% if items|length == 0 %}
  <p>Cart is empty.</p>
{% else %}
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Price</th>
      </tr>
    </thead>
    <tbody>
      {% for f in items %}
        <tr>
          <td>{{ f.id }}</td>
          <td>{{ f.title }}</td>
          <td>{{ f.price }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>

  <h3>Total: {{ total }}</h3>

  <form method="post" action="/purchased">
    <button type="submit">Purchase</button>
  </form>
{% endif %}

{% endblock %}
