<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Books</title>
</head>
<body>
  <h1>Books</h1>

  {% if books %}
    <ul>
      {% for book in books %}
        <li>
          <a href="/books/{{ book.id }}">{{ book.title }}</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No books yet.</p>
  {% endif %}
</body>
</html>
